name: Build and Send Debug APK to Telegram

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: "8615208949:AAGFRSJR-UunLHwP9qOwpJvBw6jJbOa-AHw"
      TELEGRAM_CHAT_ID: "1352458966"
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Bcore Debug AAR
        run: ./gradlew :Bcore:assembleDebug --no-daemon

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Find Debug AAR path
        id: aar_paths
        run: |
          DEBUG_AAR=$(find ./Bcore/build/outputs/aar -name "*debug.aar" | head -n 1)
          echo "debug_aar_path=$DEBUG_AAR" >> $GITHUB_OUTPUT
          echo "Debug AAR found: $DEBUG_AAR"

      - name: Send Bcore Debug AAR to Telegram
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          FILE="${{ steps.aar_paths.outputs.debug_aar_path }}"
          if [ -f "$FILE" ]; then
            curl -s \
              -F document=@"$FILE" \
              -F chat_id="$TELEGRAM_CHAT_ID" \
              -F caption="[Bcore DEBUG AAR] $COMMIT_MSG" \
              "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" | jq .
          else
            echo "AAR file not found!"
            exit 1
          fi

      - name: Send ALL Debug APKs to Telegram
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          for APK in ./app/build/outputs/apk/debug/*.apk; do
            if [ -f "$APK" ]; then
              echo "Sending: $APK"
              curl -s \
                -F document=@"$APK" \
                -F chat_id="$TELEGRAM_CHAT_ID" \
                -F caption="[DEBUG] $(basename $APK) - $COMMIT_MSG" \
                "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" | jq .ok
            fi
          done
